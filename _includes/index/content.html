<div class="container my-4">
  <div class="row">
    <div class="col-md-8">
      <h2>{{ site.title }}</h2>
      <p>{{ site.description }}</p>
      {% if site.author %}
      <p><strong>Creator:</strong> {{ site.author }}</p>
      {% endif %}
    </div>
    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Collection Information</h5>
          <p class="card-text">
            {% assign items = site.data[site.metadata] %}
            <strong>Items:</strong> {{ items.size }}
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
