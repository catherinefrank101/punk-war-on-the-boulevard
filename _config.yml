##########
# collectionbuilder-csv
# Jekyll Digital Collection Generator
# https://github.com/CollectionBuilder/collectionbuilder-csv
##########

##########
# URL VARIABLES
#
# site domain, full URL to the production location of your collection
url: 
# path to location on the domain if necessary e.g. /digital/hjccc
baseurl: 
# location of code, the full url to your github repository
source-code: https://github.com/CollectionBuilder/collectionbuilder-csv

##########
# SITE SETTINGS
#
# title of site appears in banner
title: My Digital Collection
# tagline, a short phrase that will appear throughout the site in the top banner
tagline: A Digital Collection Built with CollectionBuilder
# description appears in meta tags and other locations
description: "A digital collection created using CollectionBuilder."
# keywords separated by semicolons
keywords: digital collection; archive; history
# creator of the digital collection
author: Catherine Frank

##########
# COLLECTION SETTINGS
#
# Name of CSV file in the _data folder (WITHOUT .csv)
metadata: full_metadata

##########
# ORGANIZATION SETTINGS
#
organization-name: "Center for Digital Inquiry and Learning (CDIL)"
organization-link: https://cdil.lib.uidaho.edu/

organization-logo-banner: https://www.lib.uidaho.edu/collectionbuilder/cdil-black.png
organization-logo-nav: https://www.lib.uidaho.edu/collectionbuilder/cdil-white.png

##########
# ROBOTS EXCLUDE
#
# noindex: true 

##########
# BUILD SETTINGS
#
lib-assets: /assets/lib

exclude: 
  - docs/
  - Rakefile
  - rakelib/
  - README.md
  - LICENSE
  - CITATION.cff
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - SECURITY.md

sass:
  style: compressed
